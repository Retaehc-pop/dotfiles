# See https://wiki.hyprland.org/Configuring/Keywords/ 
exec-once = ~/.config/waybar/launch.sh                                                        # Launch System Panel
exec-once = hyprpaper                                                                         # Wallpaper
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP  # for XDPH
exec-once = ~/.config/hypr/scripts/resetxdgportal.sh                                          # reset XDPH for screenshare
exec-once = dbus-update-activation-environment --systemd --all                                # for XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP           # for XDPH
exec-once = wl-paste --type text --watch cliphist store                                       # Clipboard Manager
exec-once = wl-paste --type image --watch cliphist store                                      # Clipboard Manager
exec-once = dunst                                                                             # start notification daemon
exec-once = hypridle                                                                          # lockscreen Manager
exec-once = ~/.config/hypr/scripts/batterynotify.sh                                           # battery notification
exec-once = blueman-applet                                                                    # systray for Bluetooth
exec-once = nm-applet --indicator                                                             # systray for Network/Wifi


# Some default env vars.


# ‚ĖÄ‚Ėą‚ĖÄ ‚Ėí‚Ėą‚ĖĄ‚ĖĎ‚Ėí‚Ėą ‚Ėí‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚ĖÄ‚ĖÄ‚Ėą‚ĖÄ‚ĖÄ 
# ‚Ėí‚Ėą‚ĖĎ ‚Ėí‚Ėą‚Ėí‚Ėą‚Ėí‚Ėą ‚Ėí‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ 
# ‚ĖĄ‚Ėą‚ĖĄ ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚ĖÄ‚Ėą ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ


input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default=true

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = 1
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance=399
    workspace_swipe_create_new=-1
}


# ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚Ėí‚Ėą ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚ĖÄ‚ĖÄ‚Ėą‚ĖÄ‚ĖÄ 
# ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚ĖĎ ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚Ėí‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ 
# ‚Ėí‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ ‚ĖĎ‚ĖĎ‚Ėí‚Ėą‚ĖĎ‚ĖĎ ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖÄ ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ


dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}



# ‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ 
# ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚ĖĎ‚Ėą‚ĒÄ ‚ĖÄ‚ĖÄ‚Ėą ‚Ėą‚ĒÄ‚ĒÄ 
# ‚ĖĎ‚Ėą‚ĒÄ‚ĒÄ‚ĖĎ‚Ėą ‚ĖĄ‚Ėą‚ĖĄ ‚ĖÄ‚ĖÄ‚ĖÄ ‚ĖÄ‚ĖÄ‚ĖÄ


misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = -2 # Set to 0 or 1 to disable the anime mascot wallpapers
}




# ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ‚ĖĄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚ĖÄ‚ĖÄ‚Ėą‚ĖÄ‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ‚ĖĄ 
# ‚Ėí‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚Ėí‚Ėą‚ĖĎ ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ ‚Ėí‚Ėą‚ĖĎ ‚Ėą‚ĖĎ‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą 
# ‚Ėí‚Ėą‚ĖĎ‚Ėí‚Ėą ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ ‚ĖĄ‚Ėą‚ĖĄ ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖÄ ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ ‚ĖĄ‚Ėą‚ĖĄ ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖÄ ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ


animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = linear, 1, 1, 1, 1
    animation = windows, 1, 7, wind, slide
    animation = windowsIn, 1, 7, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, linear
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}


$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


windowrulev2 = suppressevent maximize, class:.*
# Screensharing
windowrulev2 = opacity 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$


workspace=eDP-1,1
workspace=eDP-1,2
workspace=DP-4,3
workspace=DP-4,4
workspace=DP-5,5
workspace=DP-5,6
workspace=DP-6,7
workspace=DP-6,8
workspace=DP-7,9
workspace=DP-7,10



# ‚Ėí‚Ėą‚ĖĎ‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚Ėí‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ‚Ėą 
# ‚Ėí‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėí‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ‚Ėą 
# ‚Ėí‚Ėą‚ĖĎ‚Ėí‚Ėą ‚ĖÄ‚ĖÄ‚ĖÄ ‚ĖĎ‚ĖĎ‚Ėí‚Ėą‚ĖĎ‚ĖĎ ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖÄ ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Application Launcher
bind = $mainMod, R, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Q, exec, $terminal

# Window/Session actions
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, F, togglefloating,
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, P, pseudo, # dwindle
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, mouse:272, movewindow
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# Workspaces
bind = $mainMod SHIFT, right, workspace, e+1
bind = $mainMod SHIFT, left, workspace, e-1
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, S, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

#bind = $mainMod, V, exec, cliphist list | rofi --dmenu | cliphist decode | wl-copy

# Special keys
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = ,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind = ,XF86MonBrightnessUp,exec,brightnessctl set +5% 

# Screenshot
bind = $mainMod SHIFT, s, exec, grim -g "$(slurp -d)" | wl-copy
bind = ,print, exec, grim -g "$(slurp -d)" | wl-copy


# ‚Ėí‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą ‚Ėí‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚Ėí‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚ĖÄ‚ĖÄ‚Ėą‚ĖÄ‚ĖÄ ‚Ėí‚Ėą‚ĖĎ‚ĖĎ‚Ėí‚Ėą 
