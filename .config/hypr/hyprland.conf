source=~/.config/hypr/themes/macchiato.conf

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 8
    border_size = 2
    col.active_border = $flamingo $rosewater 45deg
    col.inactive_border = $base
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

group {
    col.border_active = rgba(b16286cc) rgba(eebd35cc) 45deg
    col.border_inactive = rgba(689d6acc) rgba(458588cc) 45deg
    col.border_locked_active = rgba(b16286cc) rgba(eebd35cc) 45deg
    col.border_locked_inactive = rgba(689d6acc) rgba(458588cc) 45deg
}

decoration {
    rounding = 10
    drop_shadow = false

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = on
        ignore_opacity = on
        vibrancy = 0.1696
        brightness = 1.5
        xray = false
    }

    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}


